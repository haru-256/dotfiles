theme = "catppuccin_latte"

[editor]
# Catppuccin などのテーマを正しく表示するためにトゥルーカラーを有効にする
true-color = true
# 行番号
line-number = "absolute"
# カーソル行のハイライト
cursorline = true
# カーソル列のハイライト
cursorcolumn = false
# クリップボードをOSと共有する
clipboard-provider = "pasteboard"
# カーソルから上下に保つ最小行数
scrolloff = 8
# マウス操作を有効にする
mouse = true
# フォーカスを失ったときに自動保存 (Zed の autosave: on_focus_change と同様)
auto-save = { focus-lost = true }
# 保存時にファイル末尾の改行を保証する (Zed の ensure_final_newline_on_save と同様)
insert-final-newline = true
# 保存時に行末の余分な空白を除去する
trim-trailing-whitespace = true
# 補完ポップアップに丸みのある枠をつける
popup-border = "all"
# 差分マーカーを gutter に表示する
gutters = ["diagnostics", "diff", "line-numbers", "spacer"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]

[editor.search]
# 大文字を含む場合だけ大文字小文字を区別する
smart-case = true


[editor.soft-wrap]
# エディタ幅で折り返す (Zed の soft_wrap: editor_width と同様)
enable = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[keys.normal]
# x/X で1文字削除 (vim と同様。Helix デフォルトの行選択は V に移動)
x = "delete_char_forward"
X = "delete_char_backward"
# V で行選択 (vim の V と同様。Helix デフォルトの x を移植)
V = "select_line_below"

[keys.normal.g]
# 定義ジャンプ後などにひとつ前の場所へ戻る (nvim の gb / <C-o> と同様)
# gd / gr / K は Helix デフォルトで nvim と同じキーに割り当て済み
# gd → goto_definition, gr → goto_references, K → hover
b = "jump_backward"

[keys.normal.space]
# ファイル・バッファ・全文検索 (nvim の <leader>ff/fg/fb と同様)
f = { f = "file_picker", g = "global_search", b = "buffer_picker" }
# バッファピッカー単独でも引けるように残す
b = "buffer_picker"
# LSP: フォーマット / リネーム (nvim の <leader>lf / <leader>rn と同様)
l = { f = "format_selections" }
r = { n = "rename_symbol" }

[keys.insert]
# Ctrl+[ でノーマルモードに戻る (vim の Esc / Ctrl+[ と同様)
"C-[" = "normal_mode"

[keys.select]
# Ctrl+[ でノーマルモードに戻る
"C-[" = "normal_mode"
